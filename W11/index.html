<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Box</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="quotes-page">
    <section class="quotes-page__section">
      <section class="quote-box">
        <div class="quote-box__quote">
          <p>
            Everybody is a genius. But if you judge a fish by its ability to
            climb a tree, it will live its whole life believing that it is
            stupid.
          </p>
          <p class="quote-box__quote-author">Albert Einstein</p>
        </div>
        <div class="quote-box__author-image">
          <img src="albert.jpeg" alt="Albert Einstein" />
        </div>
      </section>
    </section>
  </main>
</body>
</html>
