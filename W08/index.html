<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Week 8 Animation Boxes</title>
    <link rel="stylesheet" href="W08.css" />
  </head>
  <body>
    <div class="wrapper">
      <!-- 1 -->
      <div class="container container-one">
        <div class="orbiting-circle"></div>
      </div>

      <!-- 2 -->
      <div class="container container-two">
        <div class="morphing-circle"></div>

          <div class="half half--left"></div>
          <div class="half half--right"></div>

      </div>

      <!-- 4 -->
      <div class="container container-four">
        <div class="beat-circle"></div>
      </div>
    </div>
  </body>
