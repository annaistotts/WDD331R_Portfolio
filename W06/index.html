<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Week 6 Cart</title>
    <link rel="stylesheet" href="W06.css" />
  </head>
  <body>
    <div class="cart">
      <div class="cart__header">
        <h1 class="cart__title">Your cart</h1>
        <span class="cart__count">3</span>
      </div>

      <section class="cart__summary" aria-label="Shopping cart summary">
        <ul class="cart__list">
          <li class="cart__item">
            <div class="cart__item-info">
              <h2 class="cart__item-name">Product name</h2>
              <p class="cart__item-description">Brief description</p>
            </div>
            <p class="cart__item-price">$12</p>
          </li>

          <li class="cart__item">
            <div class="cart__item-info">
              <h2 class="cart__item-name">Second product</h2>
              <p class="cart__item-description">Brief description</p>
            </div>
            <p class="cart__item-price">$8</p>
          </li>

          <li class="cart__item">
            <div class="cart__item-info">
              <h2 class="cart__item-name">Third item</h2>
              <p class="cart__item-description">Brief description</p>
            </div>
            <p class="cart__item-price">$5</p>
          </li>

          <li class="cart__item cart__item--promo">
            <div class="cart__item-info">
              <h2 class="cart__item-name">Promo code</h2>
              <p class="cart__item-description">EXAMPLECODE</p>
            </div>
            <p class="cart__item-price">-$5</p>
          </li>
        </ul>

        <div class="cart__total">
          <p class="cart__total-label">Total (USD)</p>
          <p class="cart__total-price">$20</p>
        </div>
      </section>

      <form class="cart__form">
        <label for="promo-code" class="cart__label sr-only">Promo code</label>
        <input
          type="text"
          id="promo-code"
          class="cart__input"
          placeholder="Promo code"
        />
        <button type="submit" class="cart__button">Redeem</button>
      </form>
    </div>
  </body>
</html>
